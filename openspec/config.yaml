# OpenSpec project context — EVI (Evolving Virtual Intelligence)
schema: spec-driven

context: |
  EVI: FastAPI + LangGraph ReAct + Ollama (qwen2.5:7b) + Qdrant + Postgres sessions.
  Orchestration target: Windmill (scripts in repo, wmill sync). WhatsApp: Evolution API webhooks.
  Legacy n8n is being removed — do not add n8n workflows.

  Hardware: 16GB RAM, GTX 1060 6GB — OLLAMA_MAX_LOADED_MODELS=1.

  Product priority: productivity (files, notes, email/tasks, WhatsApp commitments)
  > remote (Telegram) > dev bridge > university RAG (secondary).

  Conventions: tools in agent/tools/; register in agent/tools/registry.py;
  bounded memory (8 pairs); secrets in .env only.

  Source of truth: openspec/specs/ (not Progress.md nor personal-ai-agent-server.md).
  Active work: exactly one folder under openspec/changes/ — read openspec/AGENTS.md first.

  Verification: Tier 1 unit tests + Tier 2 ./scripts/evi-test <feature> before archive.
  Apply: use `openspec instructions apply --change <name> --json` for contextFiles only.

rules:
  proposal:
    - Max 15 lines of intent; link product priority.
    - List explicit Out of scope.
  tasks:
    - Each task MUST include SCN-* (if applicable), Files: (max 5 paths), Verify: (evi-test command).
    - One logical deliverable per task; 5-12 tasks per change.
  design:
    - RAM impact for new containers; Windmill/Evolution ports.
    - Out of scope section required.
  apply:
    - Do NOT read personal-ai-agent-server.md or Progress.md unless the user asks.
    - Do NOT read files outside the current task Files: list and contextFiles from CLI.
    - Mark tasks [x] immediately after Verify passes.
    - Prefer get_code_snippet / offset+limit over full file reads.
