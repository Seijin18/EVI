services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage
    mem_limit: 1g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bash -c ''exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && head -c 300 <&3 | grep -q "all shards are ready"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  windmill-server:
    image: ghcr.io/windmill-labs/windmill:main
    ports: ["8001:8000"]
    environment:
      - DATABASE_URL=postgresql://${WINDMILL_DB_USER:-windmill}:${WINDMILL_DB_PASSWORD:-windmill}@postgres:5432/windmill?sslmode=disable
      - MODE=server
      - BASE_URL=http://localhost:8001
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  windmill-worker:
    image: ghcr.io/windmill-labs/windmill:main
    environment:
      - DATABASE_URL=postgresql://${WINDMILL_DB_USER:-windmill}:${WINDMILL_DB_PASSWORD:-windmill}@postgres:5432/windmill?sslmode=disable
      - MODE=worker
      - WORKER_GROUP=default
    depends_on:
      windmill-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped

  evolution-api:
    # atendai/* v2.1.1 often fails QR (statusReason 405 loop); use maintained image
    image: evoapicloud/evolution-api:v2.3.7
    ports: ["8082:8080"]
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8082}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-evi-dev-key}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_evi
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${EVOLUTION_WEBHOOK_URL:-http://agent-api:8000/webhooks/evolution}
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - QRCODE_LIMIT=30
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 768m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    mem_limit: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  neo4j:
    image: neo4j:5-community
    profiles: ["graph"]
    ports: ["7474:7474", "7687:7687"]
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    volumes:
      - ./data/neo4j:/data
    mem_limit: 1536m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  # Prometheus: scrape http://agent-api:8000/metrics when EVI_METRICS_ENABLED=true (no prometheus container in compose)
  agent-api:
    build: ./agent
    ports: ["8002:8000"]
    env_file:
      - .env
    environment:
      - EVI_LLM_PROVIDER=${EVI_LLM_PROVIDER:-ollama}
      - EVI_EMBED_PROVIDER=${EVI_EMBED_PROVIDER:-ollama}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_EMBED_MODEL=${GEMINI_EMBED_MODEL:-models/gemini-embedding-001}
      - EMBED_DIM=${EMBED_DIM:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b-instruct-q4_K_M}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - QDRANT_URL=${QDRANT_URL}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - WINDMILL_WEBHOOK_CALENDAR=${WINDMILL_WEBHOOK_CALENDAR}
      - WINDMILL_WEBHOOK_TASKS=${WINDMILL_WEBHOOK_TASKS}
      - WINDMILL_WEBHOOK_LIST_TASKS=${WINDMILL_WEBHOOK_LIST_TASKS:-http://windmill-server:8000/api/w/evi/jobs/run/p/f/integrations/list_tasks}
      - WINDMILL_WEBHOOK_EMAIL=${WINDMILL_WEBHOOK_EMAIL}
      - WINDMILL_WEBHOOK_EMAIL_DELETE=${WINDMILL_WEBHOOK_EMAIL_DELETE:-http://windmill-server:8000/api/w/evi/jobs/run/p/f/integrations/delete_emails}
      - WINDMILL_WEBHOOK_EMAIL_DELETE_QUERY=${WINDMILL_WEBHOOK_EMAIL_DELETE_QUERY:-http://windmill-server:8000/api/w/evi/jobs/run/p/f/integrations/delete_emails_by_query}
      - WINDMILL_WEBHOOK_TELEGRAM=${WINDMILL_WEBHOOK_TELEGRAM}
      - WINDMILL_TOKEN=${WINDMILL_TOKEN:-}
      - WINDMILL_CALENDAR_ID=${WINDMILL_CALENDAR_ID:-primary}
      # Windmill OAuth resource paths (GCAL/GTASKS/GMAIL/GCLOUD) — loaded from env_file (.env)
      # only; do not interpolate here (shell exports would override .env).
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_MODE=${TELEGRAM_MODE:-}
      - EVI_TIMEZONE=${EVI_TIMEZONE:-America/Sao_Paulo}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - EVI_API_KEY=${EVI_API_KEY:-}
      - EVI_PROJECT_ROOT=${EVI_PROJECT_ROOT:-/home/marshibs/Projects/EVI}
      # Host path in .env is for local scripts; container uses mounted /workspace
      - EVI_WORKSPACE=/workspace
      - EVI_DIRECT_HANDLERS=${EVI_DIRECT_HANDLERS:-false}
      - EVI_FIXTURES_DIR=/fixtures
      # Host path in .env is for local scripts; container always uses mounted /logs
      - EVI_LOG_DIR=/logs
      - EVI_WHATSAPP_MAX_PER_WEBHOOK=${EVI_WHATSAPP_MAX_PER_WEBHOOK:-10}
      - EVI_WHATSAPP_MAX_AGE_HOURS=${EVI_WHATSAPP_MAX_AGE_HOURS:-24}
      - EVI_WHATSAPP_REQUIRE_TS=${EVI_WHATSAPP_REQUIRE_TS:-true}
      - EVI_WHATSAPP_INCOMING_ONLY=${EVI_WHATSAPP_INCOMING_ONLY:-true}
      - EVI_WHATSAPP_SKIP_GROUPS=${EVI_WHATSAPP_SKIP_GROUPS:-true}
      - EVI_WHATSAPP_GROUP_WHITELIST=${EVI_WHATSAPP_GROUP_WHITELIST:-}
      - EVI_WHATSAPP_DEDUPE_IDS=${EVI_WHATSAPP_DEDUPE_IDS:-true}
      - EVI_BACKFILL_MAX_MESSAGES=${EVI_BACKFILL_MAX_MESSAGES:-200}
      - EVI_BACKFILL_INCLUDE_FROM_ME=${EVI_BACKFILL_INCLUDE_FROM_ME:-true}
      - EVI_EVOLUTION_DISCOVER_CONTACTS=${EVI_EVOLUTION_DISCOVER_CONTACTS:-true}
      - EVI_EVOLUTION_CONTACTS_LIMIT=${EVI_EVOLUTION_CONTACTS_LIMIT:-300}
      - EVI_WHATSAPP_RECENT_MAX_CHATS=${EVI_WHATSAPP_RECENT_MAX_CHATS:-30}
      - EVI_WHATSAPP_RECENT_MSG_PER_CHAT=${EVI_WHATSAPP_RECENT_MSG_PER_CHAT:-15}
      - EVI_COMMITMENT_REPLAY_ON_LIST=${EVI_COMMITMENT_REPLAY_ON_LIST:-true}
      - EVI_COMMITMENT_REPLAY_DAYS=${EVI_COMMITMENT_REPLAY_DAYS:-14}
      - EVI_WHATSAPP_CONTROL_JIDS=${EVI_WHATSAPP_CONTROL_JIDS:-}
      - EVI_WHATSAPP_REPLY_PREFIX=${EVI_WHATSAPP_REPLY_PREFIX:-[EVI] }
      - EVI_NOTIFY_CHANNELS=${EVI_NOTIFY_CHANNELS:-telegram}
      - EVI_METRICS_ENABLED=${EVI_METRICS_ENABLED:-true}
      - EVI_CONTACT_MEMORY_DIR=${EVI_CONTACT_MEMORY_DIR:-/data/contact_memory}
      - NEO4J_URI=${NEO4J_URI:-}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
      # In-container outbound WhatsApp must use Docker DNS (not localhost from .env)
      - EVOLUTION_SERVER_URL=http://evolution-api:8080
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-evi}
    volumes:
      - ./watched_folders:/watched_folders
      - ./logs:/logs
      - ./data/contact_memory:/data/contact_memory
      - ./EVI_WORKSPACE:/workspace
      - ./tests/fixtures:/fixtures:ro
    mem_limit: 2g
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      windmill-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/'', timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    mem_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s
