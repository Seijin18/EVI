services:
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes:
      - ./data/qdrant:/qdrant/storage
    mem_limit: 1g
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bash -c ''exec 3<>/dev/tcp/127.0.0.1/6333 && printf "GET /readyz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n" >&3 && head -c 300 <&3 | grep -q "all shards are ready"''',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  windmill-server:
    image: ghcr.io/windmill-labs/windmill:main
    ports: ["8001:8000"]
    environment:
      - DATABASE_URL=postgresql://${WINDMILL_DB_USER:-windmill}:${WINDMILL_DB_PASSWORD:-windmill}@postgres:5432/windmill?sslmode=disable
      - MODE=server
      - BASE_URL=http://localhost:8001
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

  windmill-worker:
    image: ghcr.io/windmill-labs/windmill:main
    environment:
      - DATABASE_URL=postgresql://${WINDMILL_DB_USER:-windmill}:${WINDMILL_DB_PASSWORD:-windmill}@postgres:5432/windmill?sslmode=disable
      - MODE=worker
      - WORKER_GROUP=default
    depends_on:
      windmill-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped

  evolution-api:
    # atendai/* v2.1.1 often fails QR (statusReason 405 loop); use maintained image
    image: evoapicloud/evolution-api:v2.3.7
    ports: ["8082:8080"]
    environment:
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8082}
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-evi-dev-key}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_evi
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/0
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${EVOLUTION_WEBHOOK_URL:-http://agent-api:8000/webhooks/evolution}
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - QRCODE_LIMIT=30
      - CONFIG_SESSION_PHONE_CLIENT=Chrome
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - NODE_OPTIONS=--dns-result-order=ipv4first
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 768m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    mem_limit: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # Prometheus: scrape http://agent-api:8000/metrics when EVI_METRICS_ENABLED=true (no prometheus container in compose)
  agent-api:
    build: ./agent
    ports: ["8002:8000"]
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b-instruct-q4_K_M}
      - QDRANT_URL=${QDRANT_URL}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - WINDMILL_WEBHOOK_CALENDAR=${WINDMILL_WEBHOOK_CALENDAR}
      - WINDMILL_WEBHOOK_TASKS=${WINDMILL_WEBHOOK_TASKS}
      - WINDMILL_WEBHOOK_EMAIL=${WINDMILL_WEBHOOK_EMAIL}
      - WINDMILL_WEBHOOK_TELEGRAM=${WINDMILL_WEBHOOK_TELEGRAM}
      - WINDMILL_TOKEN=${WINDMILL_TOKEN:-}
      - WINDMILL_GCAL_RESOURCE=${WINDMILL_GCAL_RESOURCE:-gcal}
      - WINDMILL_CALENDAR_ID=${WINDMILL_CALENDAR_ID:-primary}
      - WINDMILL_GTASKS_RESOURCE=${WINDMILL_GTASKS_RESOURCE:-gtasks}
      - WINDMILL_GMAIL_RESOURCE=${WINDMILL_GMAIL_RESOURCE:-gmail}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - TELEGRAM_MODE=${TELEGRAM_MODE:-}
      - EVI_TIMEZONE=${EVI_TIMEZONE:-America/Sao_Paulo}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-}
      - EVI_API_KEY=${EVI_API_KEY:-}
      - EVI_PROJECT_ROOT=${EVI_PROJECT_ROOT:-/home/marshibs/Projects/EVI}
      # Host path in .env is for local scripts; container always uses mounted /logs
      - EVI_LOG_DIR=/logs
      - EVI_WHATSAPP_MAX_PER_WEBHOOK=${EVI_WHATSAPP_MAX_PER_WEBHOOK:-10}
      - EVI_WHATSAPP_MAX_AGE_HOURS=${EVI_WHATSAPP_MAX_AGE_HOURS:-24}
      - EVI_WHATSAPP_INCOMING_ONLY=${EVI_WHATSAPP_INCOMING_ONLY:-true}
      - EVI_WHATSAPP_SKIP_GROUPS=${EVI_WHATSAPP_SKIP_GROUPS:-true}
      - EVI_WHATSAPP_GROUP_WHITELIST=${EVI_WHATSAPP_GROUP_WHITELIST:-}
      - EVI_WHATSAPP_DEDUPE_IDS=${EVI_WHATSAPP_DEDUPE_IDS:-true}
      - EVI_WHATSAPP_CONTROL_JIDS=${EVI_WHATSAPP_CONTROL_JIDS:-}
      - EVI_WHATSAPP_REPLY_PREFIX=${EVI_WHATSAPP_REPLY_PREFIX:-[EVI] }
      - EVI_NOTIFY_CHANNELS=${EVI_NOTIFY_CHANNELS:-telegram}
      - EVI_METRICS_ENABLED=${EVI_METRICS_ENABLED:-true}
      # In-container outbound WhatsApp must use Docker DNS (not localhost from .env)
      - EVOLUTION_SERVER_URL=http://evolution-api:8080
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME:-evi}
    volumes:
      - ./watched_folders:/watched_folders
      - ./logs:/logs
    mem_limit: 2g
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      windmill-server:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/'', timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    mem_limit: 512m
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 15s
